aid: blur
name: Blur
description: >-
  Blur is a New York-based NFT marketplace and aggregator built for
  professional traders on Ethereum, founded by the pseudonymous "Pacman"
  (Tieshun Roquerre) in October 2022 and backed by Paradigm and Standard
  Crypto. The flagship product, blur.io, offers zero marketplace fees,
  multi-marketplace sweeping, bulk listing/bidding, real-time mempool
  reveal sniping, and a portfolio-grade analytics surface that aggregates
  liquidity from OpenSea, X2Y2, LooksRare, and other Seaport-compatible
  venues. Blur also operates Blend, a peer-to-peer perpetual NFT lending
  protocol designed by Paradigm researchers that powers ETH-against-NFT
  borrowing and Buy-Now-Pay-Later flows without oracles or fixed
  expiries — Blend has captured the dominant share of NFT lending volume
  on Ethereum. The BLUR token, distributed via multi-season airdrop
  campaigns, governs the Blur DAO through the Blur Foundation. The same
  team launched Blast, an Ethereum L2 with native yield, which now hosts
  its own NFT activity. Blur does not publish an official public
  developer API or SDK; on-chain integration happens via the deployed
  marketplace and Blend smart contracts (Seaport-compatible), and
  marketplace data is reached through third-party indexers such as
  Bitquery, SimpleHash, and Alchemy rather than a Blur-operated REST or
  GraphQL endpoint.
